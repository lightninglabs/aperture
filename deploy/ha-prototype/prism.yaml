# prism.yaml — config used by all 3 prism replicas in the HA prototype.
#
# Three things make this an HA-ready config (vs sample-conf-tmp.yaml):
#
#   1. dbbackend: postgres            — state shared across replicas
#   2. insecure: true                 — nginx terminates TLS, prism speaks
#                                       plain HTTP to the LB
#   3. basedir is a shared volume     — the admin macaroon/rootkey
#                                       generated by whichever replica
#                                       wins the boot race is reused by
#                                       the others
#
# lnd is the same alice running on the host (`itest_sui_single_coin.sh`).
# Containers reach the host via host.docker.internal (extra_hosts in
# docker-compose.yml). TLS cert + macaroon are mounted read-only.

listenaddr: "0.0.0.0:8080"
servestatic: false
debuglevel: "info"
basedir: "/srv/prism"

# Override the 30s default for faster local demo. Production should
# stick to the default (or longer); 5s adds 6× the DB load.
servicepollinterval: 5s

# nginx terminates TLS facing the client; prism only speaks HTTP inside
# the docker network, so it can run insecurely behind the LB.
insecure: true
strictverify: false
invoicebatchsize: 100000
idletimeout: 2m
readtimeout: 15s
writetimeout: 30s

authenticator:
  network: "devnet"
  disable: false
  lndhost: "host.docker.internal:10009"
  tlspath: "/srv/lnd/tls.cert"
  macdir: "/srv/lnd/macaroons"

  # Enable both schemes so the prototype can drive L402 + MPP scripts.
  enablempp: true
  mpprealm: "prism.ha.local"
  enablesessions: true

# Admin API on so we can poke at /sessions, /transactions etc through
# the LB. macaroonpath is pinned to the shared `prism-state` volume so
# all 3 replicas read the same admin.macaroon + admin.rootkey — without
# this, each replica would auto-generate its own root key in
# /root/.prism and the macaroon issued by replica N would only be
# accepted by replica N. (root keys live on disk, not in the DB.)
admin:
  enabled: true
  macaroonpath: "/srv/prism/admin.macaroon"

# Postgres in the same compose network.
dbbackend: "postgres"
postgres:
  host: "postgres"
  port: 5432
  user: "prism"
  password: "prism"
  dbname: "prism"
  maxconnections: 25
  requireSSL: false

services:
  - name: "service1"
    hostregexp: '^service1\.local$'
    pathregexp: '^/.*$'
    address: "host.docker.internal:9998"
    protocol: http
    price: 10000000
    capabilities: "demo"

prometheus:
  enabled: true
  listenaddr: "0.0.0.0:9000"

logging:
  console:
    style: false
    notimestamps: false
    level: "info"
  file:
    disable: true
