worker_processes auto;
events { worker_connections 1024; }

http {
    # Three prism replicas — round-robin by default. The replicas are
    # stateless (all state in shared Postgres + shared basedir volume),
    # so any client request can land on any backend.
    upstream prism_backends {
        server prism-1:8080;
        server prism-2:8080;
        server prism-3:8080;
    }

    log_format upstream_route '$remote_addr -> $upstream_addr  '
                              '"$request" $status  ${request_time}s';
    access_log /var/log/nginx/access.log upstream_route;

    # Plain-HTTP to the prism replicas inside the compose network;
    # client-facing TLS happens here.
    server {
        listen 8443 ssl http2;
        server_name prism.ha.local;

        ssl_certificate     /etc/nginx/tls.crt;
        ssl_certificate_key /etc/nginx/tls.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Forward everything to one of the prism replicas.
        location / {
            proxy_pass http://prism_backends;
            proxy_http_version 1.1;

            # Preserve the virtual host the client sent — prism's
            # hostregexp matching depends on it.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # gRPC / WebSocket upgrade pass-through (LNC, dashboard SSE).
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $http_connection;

            # Keep long-lived streams alive (MPP session bearer flow,
            # SubscribeInvoices fan-out doesn't go through nginx but
            # the dashboard SWR polls do).
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
