# nginx server block for prism — drop into /etc/nginx/conf.d/ on the
# host that runs this stack, alongside whatever server blocks already
# serve agents-pay.loka.cash etc.
#
# Bring up the docker-compose stack first so 127.0.0.1:8081/8082/8083
# are listening, then `nginx -t` and `systemctl reload nginx`.
#
# Assumes:
#   • TLS cert at /etc/letsencrypt/live/prism.loka.cash/fullchain.pem
#     (see README for certbot incantation; HTTP-01 issues per-name
#     certs, or use DNS-01 for a *.prism.loka.cash wildcard cert)
#   • prism running on the same host with ports published as
#     127.0.0.1:8081/8082/8083 (per docker-compose.yml)

upstream prism_backends {
    # All three replicas are equal — round-robin is fine because
    # state is shared via Postgres + the macaroon volume. Marks a
    # backend down after 1 failure within 10s; brings it back when
    # next request happens to land there.
    server 127.0.0.1:8081 max_fails=1 fail_timeout=10s;
    server 127.0.0.1:8082 max_fails=1 fail_timeout=10s;
    server 127.0.0.1:8083 max_fails=1 fail_timeout=10s;
    keepalive 32;
}

server {
    # Match both the apex and any subdomain. Add explicit names below
    # as merchants onboard, or keep the wildcard for self-service.
    server_name prism.loka.cash *.prism.loka.cash;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    # certbot --nginx will populate these the first time it runs.
    ssl_certificate     /etc/letsencrypt/live/prism.loka.cash/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prism.loka.cash/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Generous bodies for invoice submissions / admin API JSON.
    client_max_body_size 4m;

    location / {
        proxy_pass http://prism_backends;
        proxy_http_version 1.1;

        # Critical: prism's hostregexp matching depends on the original
        # Host. Without this nginx would forward "host.docker.internal"
        # or similar and no service would match.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # gRPC / WebSocket / SSE pass-through (LNC, dashboard).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;

        # Long-lived MPP session bearer flows + invoice subscription
        # streaming should not be killed mid-flight.
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_buffering     off;
    }
}

# Optional: redirect bare HTTP to HTTPS. Uncomment if certbot's
# auto-managed redirect block isn't in place.
# server {
#     listen 80;
#     listen [::]:80;
#     server_name prism.loka.cash *.prism.loka.cash;
#     return 301 https://$host$request_uri;
# }
