syntax = "proto3";

package adminrpc;

option go_package = "github.com/lightninglabs/aperture/adminrpc";

service Admin {
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc CreateService(CreateServiceRequest) returns (Service);
  rpc UpdateService(UpdateServiceRequest) returns (Service);
  rpc DeleteService(DeleteServiceRequest) returns (DeleteServiceResponse);
  rpc ListTransactions(ListTransactionsRequest)
      returns (ListTransactionsResponse);
  rpc ListTokens(ListTokensRequest) returns (ListTokensResponse);
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);

  // ListSessions returns MPP prepaid sessions (open + closed). Amounts
  // are in the chain's base unit — clients pair with GetInfo.chain to
  // decide display units.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // GetSessionStats returns aggregate counters across all MPP sessions
  // (count by status, total deposits/spent, open balance). Complements
  // GetStats which only covers L402 charge-intent transactions.
  rpc GetSessionStats(GetSessionStatsRequest) returns (GetSessionStatsResponse);
}

message GetInfoRequest {}

message GetInfoResponse {
  string network = 1;
  string listen_addr = 2;
  bool insecure = 3;

  // mpp_enabled indicates whether the MPP (Payment HTTP Auth Scheme) is
  // enabled globally.
  bool mpp_enabled = 4;

  // sessions_enabled indicates whether MPP session intents are enabled.
  bool sessions_enabled = 5;

  // mpp_realm is the realm string used in MPP challenge headers.
  string mpp_realm = 6;

  // chain is the underlying blockchain the connected lnd is running on,
  // as reported by lnd's GetInfo.chains[0].chain (e.g. "bitcoin", "sui").
  // Empty if lnd could not be queried at startup.
  string chain = 7;
}

message GetHealthRequest {}

message GetHealthResponse { string status = 1; }

message ListServicesRequest {}

message ListServicesResponse { repeated Service services = 1; }

// AuthScheme specifies which payment authentication scheme(s) a service uses.
// L402 is the default for backwards compatibility with existing deployments.
enum AuthScheme {
  // AUTH_SCHEME_L402 is the default L402 (macaroon + preimage) scheme.
  AUTH_SCHEME_L402 = 0;

  // AUTH_SCHEME_MPP is the Payment HTTP Authentication Scheme (charge
  // intent only, no sessions).
  AUTH_SCHEME_MPP = 1;

  // AUTH_SCHEME_L402_MPP enables both L402 and MPP simultaneously. The
  // proxy issues challenges for both schemes and accepts either.
  AUTH_SCHEME_L402_MPP = 2;
}

message Service {
  string name = 1;
  string address = 2;
  string protocol = 3;
  string host_regexp = 4;
  string path_regexp = 5;
  int64 price = 6;
  string auth = 7;

  // auth_scheme specifies which payment auth scheme(s) are used for this
  // service. Defaults to AUTH_SCHEME_L402 for backwards compatibility.
  AuthScheme auth_scheme = 8;

  // payment optionally overrides the global authenticator lnd for this
  // service (multi-merchant mode). When set, invoices for this service
  // are issued against the merchant's own lnd so payments land in their
  // wallet — the gateway never takes custody. Unset = legacy single-lnd
  // mode using authenticator.lndhost.
  PaymentBackend payment = 9;
}

// PaymentBackend is an optional per-service lnd connection used in multi-
// merchant deployments. The merchant runs their own lnd and hands the
// gateway a minimum-privilege macaroon (invoices:read invoices:write
// info:read) so the gateway can create/verify invoices but cannot move
// funds or see wallet state.
//
// All three fields are required when the block is present. Paths are
// absolute paths on the gateway host's filesystem.
message PaymentBackend {
  // lnd_host is the merchant lnd's gRPC address (host:port).
  string lnd_host = 1;

  // tls_path is the path to the merchant lnd's tls.cert (public).
  string tls_path = 2;

  // mac_path is the absolute path to the minimum-privilege macaroon
  // file supplied by the merchant. Only invoices:{read,write} and
  // info:read are expected to be granted.
  string mac_path = 3;
}

message CreateServiceRequest {
  string name = 1;
  string address = 2;
  string protocol = 3;
  string host_regexp = 4;
  string path_regexp = 5;
  int64 price = 6;
  string auth = 7;

  // auth_scheme specifies which payment auth scheme(s) to use. Defaults to
  // AUTH_SCHEME_L402 if unset.
  AuthScheme auth_scheme = 8;

  // payment optionally configures a per-service lnd override. See the
  // Service message for field semantics. Omit for legacy single-lnd
  // mode. Setting this takes effect after the next prism restart —
  // the in-memory challenger router is built at startup.
  PaymentBackend payment = 9;
}

message UpdateServiceRequest {
  string name = 1;
  string address = 2;
  string protocol = 3;
  string host_regexp = 4;
  string path_regexp = 5;
  optional int64 price = 6;
  string auth = 7;

  // auth_scheme specifies which payment auth scheme(s) to use. When not
  // set, the existing auth_scheme is preserved (not reset to L402).
  optional AuthScheme auth_scheme = 8;

  // payment updates the per-service lnd override. When omitted (nil),
  // the existing payment config is preserved (not reset). To explicitly
  // remove a payment override from a service, set clear_payment=true
  // instead. As with CreateService, changes take effect on restart.
  PaymentBackend payment = 9;

  // clear_payment, when true, removes any existing per-service lnd
  // override from the service, returning it to the global single-lnd
  // mode. Mutually exclusive with setting payment.
  bool clear_payment = 10;
}

message DeleteServiceRequest { string name = 1; }

message DeleteServiceResponse { string status = 1; }

message ListTransactionsRequest {
  string service = 1;
  string state = 2;
  string start_date = 3;
  string end_date = 4;
  int32 limit = 5;
  int32 offset = 6;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  int64 total_count = 2;
}

message Transaction {
  int32 id = 1;
  string token_id = 2;
  string payment_hash = 3;
  string service_name = 4;
  int64 price_sats = 5;
  string state = 6;
  string created_at = 7;
  string settled_at = 8;
}

message ListTokensRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListTokensResponse {
  repeated Transaction tokens = 1;
  int64 total_count = 2;
}

message RevokeTokenRequest { string token_id = 1; }

message RevokeTokenResponse { string status = 1; }

message GetStatsRequest {
  string from = 1;
  string to = 2;
}

message GetStatsResponse {
  int64 total_revenue_sats = 1;
  int64 transaction_count = 2;
  repeated ServiceRevenue service_breakdown = 3;
}

message ServiceRevenue {
  string service_name = 1;
  int64 total_revenue_sats = 2;
}

// MPPSession mirrors the on-server session record for the admin API.
// Payment hash is hex-encoded. Amounts are in the chain's base unit.
message MPPSession {
  string session_id = 1;
  string payment_hash = 2;
  int64 deposit_sats = 3;
  int64 spent_sats = 4;

  // balance_sats is deposit_sats - spent_sats. Meaningful for open
  // sessions; on closed ones this is what was refunded at close time.
  int64 balance_sats = 5;

  string return_invoice = 6;

  // status is "open" or "closed".
  string status = 7;

  // created_at / updated_at are RFC 3339 timestamps.
  string created_at = 8;
  string updated_at = 9;
}

message ListSessionsRequest {
  // status filters by "open" or "closed". Empty returns all.
  string status = 1;

  // limit defaults to 50 when zero. Max is 1000.
  int32 limit = 2;

  // offset is 0-based.
  int32 offset = 3;
}

message ListSessionsResponse {
  repeated MPPSession sessions = 1;

  // total is the count matching status filter, ignoring pagination.
  int64 total = 2;
}

message GetSessionStatsRequest {}

message GetSessionStatsResponse {
  int64 total_sessions = 1;
  int64 open_sessions = 2;
  int64 closed_sessions = 3;

  // total_deposit_sats is the lifetime sum of deposits across all
  // sessions (open + closed).
  int64 total_deposit_sats = 4;

  // total_spent_sats is the actual revenue — satoshis consumed by
  // bearer requests.
  int64 total_spent_sats = 5;

  // open_balance_sats is the sum of deposit_sats - spent_sats over
  // sessions still in the open state (prepaid balance owed to clients).
  int64 open_balance_sats = 6;
}
