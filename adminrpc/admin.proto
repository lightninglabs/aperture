syntax = "proto3";

package adminrpc;

option go_package = "github.com/lightninglabs/aperture/adminrpc";

service Admin {
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc CreateService(CreateServiceRequest) returns (Service);
  rpc UpdateService(UpdateServiceRequest) returns (Service);
  rpc DeleteService(DeleteServiceRequest) returns (DeleteServiceResponse);
  rpc ListTransactions(ListTransactionsRequest)
      returns (ListTransactionsResponse);
  rpc ListTokens(ListTokensRequest) returns (ListTokensResponse);
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
}

message GetInfoRequest {}

message GetInfoResponse {
  string network = 1;
  string listen_addr = 2;
  bool insecure = 3;

  // mpp_enabled indicates whether the MPP (Payment HTTP Auth Scheme) is
  // enabled globally.
  bool mpp_enabled = 4;

  // sessions_enabled indicates whether MPP session intents are enabled.
  bool sessions_enabled = 5;

  // mpp_realm is the realm string used in MPP challenge headers.
  string mpp_realm = 6;

  // chain is the underlying blockchain the connected lnd is running on,
  // as reported by lnd's GetInfo.chains[0].chain (e.g. "bitcoin", "sui").
  // Empty if lnd could not be queried at startup.
  string chain = 7;
}

message GetHealthRequest {}

message GetHealthResponse { string status = 1; }

message ListServicesRequest {}

message ListServicesResponse { repeated Service services = 1; }

// AuthScheme specifies which payment authentication scheme(s) a service uses.
// L402 is the default for backwards compatibility with existing deployments.
enum AuthScheme {
  // AUTH_SCHEME_L402 is the default L402 (macaroon + preimage) scheme.
  AUTH_SCHEME_L402 = 0;

  // AUTH_SCHEME_MPP is the Payment HTTP Authentication Scheme (charge
  // intent only, no sessions).
  AUTH_SCHEME_MPP = 1;

  // AUTH_SCHEME_L402_MPP enables both L402 and MPP simultaneously. The
  // proxy issues challenges for both schemes and accepts either.
  AUTH_SCHEME_L402_MPP = 2;
}

message Service {
  string name = 1;
  string address = 2;
  string protocol = 3;
  string host_regexp = 4;
  string path_regexp = 5;
  int64 price = 6;
  string auth = 7;

  // auth_scheme specifies which payment auth scheme(s) are used for this
  // service. Defaults to AUTH_SCHEME_L402 for backwards compatibility.
  AuthScheme auth_scheme = 8;
}

message CreateServiceRequest {
  string name = 1;
  string address = 2;
  string protocol = 3;
  string host_regexp = 4;
  string path_regexp = 5;
  int64 price = 6;
  string auth = 7;

  // auth_scheme specifies which payment auth scheme(s) to use. Defaults to
  // AUTH_SCHEME_L402 if unset.
  AuthScheme auth_scheme = 8;
}

message UpdateServiceRequest {
  string name = 1;
  string address = 2;
  string protocol = 3;
  string host_regexp = 4;
  string path_regexp = 5;
  optional int64 price = 6;
  string auth = 7;

  // auth_scheme specifies which payment auth scheme(s) to use. When not
  // set, the existing auth_scheme is preserved (not reset to L402).
  optional AuthScheme auth_scheme = 8;
}

message DeleteServiceRequest { string name = 1; }

message DeleteServiceResponse { string status = 1; }

message ListTransactionsRequest {
  string service = 1;
  string state = 2;
  string start_date = 3;
  string end_date = 4;
  int32 limit = 5;
  int32 offset = 6;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  int64 total_count = 2;
}

message Transaction {
  int32 id = 1;
  string token_id = 2;
  string payment_hash = 3;
  string service_name = 4;
  int64 price_sats = 5;
  string state = 6;
  string created_at = 7;
  string settled_at = 8;
}

message ListTokensRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListTokensResponse {
  repeated Transaction tokens = 1;
  int64 total_count = 2;
}

message RevokeTokenRequest { string token_id = 1; }

message RevokeTokenResponse { string status = 1; }

message GetStatsRequest {
  string from = 1;
  string to = 2;
}

message GetStatsResponse {
  int64 total_revenue_sats = 1;
  int64 transaction_count = 2;
  repeated ServiceRevenue service_breakdown = 3;
}

message ServiceRevenue {
  string service_name = 1;
  int64 total_revenue_sats = 2;
}
